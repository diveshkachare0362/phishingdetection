<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In | SHIELD</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Inter', sans-serif;
            background: #f3f4f6;
            min-height: 100vh;
            display: flex; align-items: center; justify-content: center;
            padding: 24px;
        }
        .card {
            background: #fff;
            border: 1px solid #e5e7eb;
            border-radius: 14px;
            padding: 40px 36px;
            width: 100%; max-width: 420px;
            box-shadow: 0 4px 24px rgba(0,0,0,.06);
        }
        .logo {
            display: flex; align-items: center; gap: 10px;
            justify-content: center; margin-bottom: 28px;
        }
        .logo-text {
            font-size: 24px; font-weight: 900;
            color: #2563eb; letter-spacing: .06em;
        }
        h1 {
            font-size: 20px; font-weight: 700; color: #111827;
            text-align: center; margin-bottom: 6px;
        }
        .sub {
            font-size: 13px; color: #6b7280;
            text-align: center; margin-bottom: 28px;
        }
        .flash-list { list-style: none; margin-bottom: 18px; display: flex; flex-direction: column; gap: 8px; }
        .flash-item {
            font-size: 13px; padding: 10px 14px; border-radius: 8px;
        }
        .flash-item.error   { background: #fef2f2; border: 1px solid #fecaca; color: #dc2626; }
        .flash-item.success { background: #f0fdf4; border: 1px solid #bbf7d0; color: #16a34a; }
        .flash-item.warning { background: #fffbeb; border: 1px solid #fde68a; color: #d97706; }

        .field { margin-bottom: 18px; }
        label { display: block; font-size: 13px; font-weight: 500; color: #374151; margin-bottom: 6px; }
        input[type="email"], input[type="password"], input[type="tel"] {
            width: 100%; padding: 11px 14px;
            border: 1.5px solid #e5e7eb; border-radius: 8px;
            font-size: 14px; font-family: 'Inter', sans-serif;
            color: #111827; outline: none;
            transition: border-color .2s, box-shadow .2s;
        }
        input:focus {
            border-color: #2563eb;
            box-shadow: 0 0 0 3px rgba(37,99,235,.1);
        }
        .btn-primary {
            width: 100%; padding: 12px;
            background: #2563eb; color: #fff;
            font-size: 14px; font-weight: 600;
            border: none; border-radius: 8px;
            cursor: pointer; font-family: 'Inter', sans-serif;
            transition: background .15s;
            margin-top: 6px;
        }
        .btn-primary:hover { background: #1d4ed8; }
        .footer-link {
            text-align: center; margin-top: 20px;
            font-size: 13px; color: #6b7280;
        }
        .footer-link a { color: #2563eb; text-decoration: none; font-weight: 500; }
        .footer-link a:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <div class="card">
        <div class="logo">
            <svg width="30" height="30" viewBox="0 0 24 24" fill="none">
                <path d="M12 2L3 6V12C3 16.97 7.02 21.61 12 23C16.98 21.61 21 16.97 21 12V6L12 2Z" fill="#2563eb"/>
                <path d="M10 17L6 13L7.41 11.59L10 14.17L16.59 7.58L18 9L10 17Z" fill="white"/>
            </svg>
            <span class="logo-text">SHIELD</span>
        </div>
        <h1>Sign in</h1>
        <p class="sub">Use your registered email and password.</p>

        {% with messages = get_flashed_messages(with_categories=true) %}
          {% if messages %}
            <ul class="flash-list">
              {% for category, message in messages %}
                <li class="flash-item {{ category }}">{{ message }}</li>
              {% endfor %}
            </ul>
          {% endif %}
        {% endwith %}

        <form method="post">
            <div class="field">
                <label for="email">Email address</label>
                <input id="email" name="email" type="email" required autocomplete="email" placeholder="you@example.com">
            </div>
            <div class="field">
                <label for="password">Password</label>
                <input id="password" name="password" type="password" required autocomplete="current-password" placeholder="••••••••">
            </div>
            <button type="submit" class="btn-primary">Sign in</button>
        </form>

        <p class="footer-link">
            No account? <a href="{{ url_for('register') }}">Create one</a>
        </p>
    </div>
</body>
</html>
